name: Run Tests
on: [push, pull_request]
jobs:
  Run-PostgreSQL-Tests:
    strategy:
      matrix:
        include:
          - search_path: slim,gdm_vocabs
            data_model: gdm
          - search_path: slim,ohdsi_vocabs
            data_model: gdm
          - search_path: wide,slim,ohdsi_vocabs
            data_model: gdm_wide
    runs-on: ubuntu-latest
    env:
      SEQUELIZER_SEARCH_PATH: ${{ matrix.search_path }}
      CONCEPTQL_DATA_MODEL: ${{ matrix.data_model }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      -
        name: Log into DockerHub
        uses: docker/login-action@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Run Tests
        run: docker compose run conceptql
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.data_model }}-${{ matrix.search_path }}
          path: coverage/
          retention-days: 90
  Run-Spark-Tests:
    strategy:
      matrix:
        #spark_version: [3.5.0, 3.3.2]
        spark_version: [3.5.7, 4.0.1]
        vocabs: [ohdsi, ohdsi_wide]
        include:
          - vocabs: ohdsi
            search_path: slim,ohdsi_vocabs
            data_model: gdm
          - vocabs: ohdsi_wide
            search_path: wide,slim,ohdsi_vocabs
            data_model: gdm_wide
    runs-on: ubuntu-22.04
    env:
      SPARK_VERSION: ${{ matrix.spark_version }}
      CONCEPTQL_DATA_MODEL: ${{ matrix.data_model }}
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: true

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ startsWith(matrix.spark_version, '4.') && '17' || '11' }}

      - uses: actions/cache@v5
        with:
          path: ~/spark-${{ matrix.spark_version }}
          key: spark-${{ env.SPARK_VERSION }}
        id: cache-spark
      - name: Download Spark
        if: steps.cache-spark.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/spark/spark-$SPARK_VERSION/spark-$SPARK_VERSION-bin-hadoop3.tgz
          tar xzf spark-$SPARK_VERSION-bin-hadoop3.tgz
          mv spark-$SPARK_VERSION-bin-hadoop3 ~/spark-$SPARK_VERSION

      - uses: actions/cache@v5
        with:
          path: /tmp/synpuf_test_data
          key: synpuf-test-data-v8
        id: cache-synpuf-test-data
      - name: Download Data
        if: steps.cache-synpuf-test-data.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          curl -sSL "https://www.dropbox.com/scl/fi/bflehlmk1itwd352z0kjk/synpuf_test_data.tgz?rlkey=ogticol20oxvis5yzq37878z7&st=vydvpdyw&dl=1" > synpuf_test_data.tgz
          tar xzf synpuf_test_data.tgz

      - run: ~/spark-$SPARK_VERSION/sbin/start-thriftserver.sh --driver-memory 5G && sleep 20
      - run: bundle exec ruby test/all.rb
        env:
          CONCEPTQL_PARQUET_TEST_DIR: '/tmp/synpuf_test_data/{${{ matrix.search_path }}}'
          SEQUELIZER_URL: hexspace://localhost:10000/default
      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-spark-${{ matrix.spark_version }}-${{ matrix.data_model }}
          path: coverage/
          retention-days: 90
  ci:
    if: always()
    needs: [Run-PostgreSQL-Tests, Run-Spark-Tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs were cancelled"
            exit 1
          fi
          echo "All CI jobs passed"
